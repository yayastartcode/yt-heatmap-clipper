# Nginx configuration for YT Heatmap Clipper
# Place this in /etc/nginx/sites-available/clipper.ahliwebmurah.space
# Then symlink to sites-enabled

upstream clipper_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name clipper.ahliwebmurah.space;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clipper.ahliwebmurah.space;

    # SSL certificates (adjust paths as needed)
    ssl_certificate /etc/ssl/cloudflare/clipper.ahliwebmurah.space.pem;
    ssl_certificate_key /etc/ssl/cloudflare/clipper.ahliwebmurah.space.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/clipper.access.log;
    error_log /var/log/nginx/clipper.error.log;

    # Max upload size (for video uploads if needed)
    client_max_body_size 500M;

    # Root location - proxy to FastAPI
    location / {
        proxy_pass http://clipper_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://clipper_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Static files (clips)
    location /clips/ {
        alias /root/.openclaw/workspace/projects/yt-heatmap-clipper/clips/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
